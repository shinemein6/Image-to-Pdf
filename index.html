<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 PDF 병합기</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>이미지 PDF 병합기</h1>
            <p>이미지를 추가하고 드래그하여 순서를 맞춘 뒤 PDF로 변환하세요.</p>
        </header>

        <main>
            <div class="controls">
                <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg, image/webp" multiple hidden>
                <label for="imageInput" class="btn btn-primary">이미지 추가 (다중 선택 가능)</label>
                <button id="generatePdfBtn" class="btn btn-success" disabled>PDF로 변환 및 다운로드</button>
            </div>

            <div id="loading" class="hidden">PDF를 생성하는 중입니다... 잠시만 기다려주세요.</div>

            <ul id="imageList" class="image-grid"></ul>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
